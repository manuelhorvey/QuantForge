version: "3.9"

services:
  engine:
    build: .
    container_name: quantforge-engine
    restart: unless-stopped
    ports:
      - "5000:5000"   # Dashboard
      - "9879:9879"   # MT5 bridge
    volumes:
      - ./data:/app/data
      - ./paper_trading/models:/app/paper_trading/models
      - ./configs:/app/configs:ro
    environment:
      - PYTHONPATH=/app
      - QUANTFORGE_BIND=0.0.0.0
      - QUANTFORGE_REFRESH_INTERVAL=${QUANTFORGE_REFRESH_INTERVAL:-60}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY:-}
      - ALERTING_WEBHOOK_URL=${ALERTING_WEBHOOK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/ping', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Prometheus + Grafana for /metrics scraping
  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: quantforge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    profiles:
      - monitoring
    depends_on:
      - engine

  grafana:
    image: grafana/grafana:11.4.0
    container_name: quantforge-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    profiles:
      - monitoring
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
